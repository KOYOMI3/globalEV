*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}

/* ─── TOP BLUE STRIPE (World Bank style) ─── */
.top-stripe{
  height:5px;
  background:linear-gradient(90deg,#005bac 0%,#0072d4 50%,#00a8e0 100%);
}

/* ─── MAIN NAV ─── */
.app-nav{
  background:#ffffff;
  border-bottom:1px solid #e2e8f0;
  height:68px;
  display:flex;align-items:center;
  padding:0 48px;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}

/* ─── LOGO (left) ─── */
.app-logo{
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;margin-right:auto;
  text-decoration:none;
}
.app-logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:8px;
  background:linear-gradient(135deg,#005bac,#0096d6);
  font-size:20px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,91,172,.3);
}
.app-logo-text{
  display:flex;flex-direction:column;gap:1px;
}
.app-logo-main{
  font-family:"Space Grotesk",sans-serif;
  font-size:15px;font-weight:700;
  color:#003366;letter-spacing:.04em;line-height:1;
}
.app-logo-sub{
  font-family:"JetBrains Mono",monospace;
  font-size:10px;font-weight:400;
  color:#6b8aad;letter-spacing:.06em;
  line-height:1;
}

/* ─── NAV TABS (right) ─── */
.app-nav-tabs{
  display:flex;align-items:stretch;height:68px;gap:0;
}
.app-nav-tab{
  display:flex;align-items:center;
  padding:0 28px;height:68px;
  background:transparent;border:none;
  font-family:"Space Grotesk",sans-serif;
  font-size:16px;font-weight:600;
  color:#334e68;
  cursor:pointer;
  transition:color .18s,background .18s;
  position:relative;white-space:nowrap;
  letter-spacing:.01em;
}
.app-nav-tab:hover{
  color:#005bac;
  background:rgba(0,91,172,.04);
}
.app-nav-tab.active{
  color:#005bac;
}
.app-nav-tab.active::after{
  content:"";
  position:absolute;bottom:0;left:16px;right:16px;
  height:3px;
  background:#005bac;
  border-radius:3px 3px 0 0;
}

/* ─── FRAMES ─── */
.page-frame{
  position:fixed;
  top:73px;   /* 5px stripe + 68px nav */
  left:0;right:0;bottom:0;
  width:100%;height:calc(100vh - 73px);
  border:none;display:none;
  background:#f0f4f8;
}
.page-frame.active{display:block}
</style>
</head>
<body>

<div class="top-stripe"></div>

<nav class="app-nav">

    <button class="app-nav-tab"         onclick="switchPage(this,'events')">大事件</button>
  </div>
</nav>

<style>

:root{
  --bg:#f0f4f8;--surface:#fff;--surface2:#f7fafc;--border:#e2e8f0;

body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased}

/* ═══ HEADER ═══ */
.hd{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#0f2240 100%);padding:0;position:relative;overflow:hidden}
.hd-circles{position:absolute;inset:0;overflow:hidden;pointer-events:none}

.hd-eyebrow::before{content:'';width:6px;height:6px;border-radius:50%;background:#60a5fa}
.hd h1{font-family:var(--ffd);font-size:clamp(32px,4vw,52px);font-weight:700;color:#f1f5f9;line-height:1.12;margin-bottom:14px;letter-spacing:-.02em}

.hd-stat-l{font-size:13px;color:#64748b;margin-top:4px}
.hd-note{position:absolute;bottom:20px;right:48px;font-size:12px;color:#475569;z-index:2}

/* ═══ MAIN ═══ */
.main{max-width:1500px;margin:0 auto;padding:36px 48px 80px}

/* ═══ METRIC CARDS ═══ */
.metric-row{display:grid;grid-template-columns:repeat(5,1fr);gap:18px;margin-bottom:28px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;box-shadow:var(--sh);position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}

.mc-sub{font-size:13px;color:var(--text2);line-height:1.5}
.mc-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:5px;margin-top:8px}

.badge-dn{background:#fee2e2;color:#dc2626}

.badge-neu{background:#f1f5f9;color:#64748b}

/* ═══ CONTROL BAR ═══ */
.ctrl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:28px;box-shadow:var(--sh)}

.ctab{padding:8px 18px;border-radius:7px;border:none;background:transparent;color:#64748b;font-family:var(--ff);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.ctab:hover{color:#1e293b;background:rgba(0,0,0,.04)}
.ctab.on{background:#fff;color:#0f172a;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.ctab.cat-on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(22,119,255,.3)}
.srch{flex:1;min-width:200px;max-width:300px;position:relative}
.srch svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:#94a3b8}
.srch input{width:100%;padding:9px 12px 9px 36px;background:#fff;border:1px solid var(--border);border-radius:9px;font-family:var(--ff);font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.srch input:focus{border-color:var(--accent)}
.srch input::placeholder{color:#94a3b8}

/* ═══ VIEWS ═══ */
.view{display:none}.view.on{display:block}

/* ═══ COUNTRY GRID ═══ */
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px}

/* ═══ POLICY CARD ═══ */
.pc{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s,transform .2s,border-color .2s}
.pc:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:#c7d2fe}

.tt{background:#ccfbf1;color:#134e4a;border-color:#99f6e4}
.tgr{background:#f1f5f9;color:#475569;border-color:#e2e8f0}

.kv{display:flex;flex-direction:column;padding:8px 0;border-bottom:1px solid #f8fafc;gap:3px}
.kv:last-child{border-bottom:none}
.kk{display:block;font-size:12px;color:#94a3b8;font-weight:400;line-height:1.4}

.upd-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--ffm);font-size:11px;color:var(--accent);margin-bottom:7px}
.upd-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

/* ═══ TARIFF TABLE ═══ */
.tft-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
table.tft{width:100%;border-collapse:collapse;min-width:860px;font-size:14px}
.tft thead{background:#f8fafc}

.tft th:first-child{min-width:165px;border-right:1px solid var(--border)}
.tft td{padding:14px 18px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.tft tr:last-child td{border-bottom:none}

.tc-r{font-size:13px;font-weight:600;display:inline-block;padding:3px 9px;border-radius:6px}
.rh{background:#fee2e2;color:#dc2626}
.rm{background:#fef3c7;color:#d97706}

/* ═══ CHARTS ═══ */
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.cg4{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;box-shadow:var(--sh)}
.chart-ttl{font-family:var(--ffd);font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px}

/* ═══ COMPARE TABLE ═══ */
.sel-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.sel-b{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:#64748b;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.sel-b:hover{border-color:var(--accent);color:var(--accent)}
.sel-b.on{background:var(--accent);border-color:var(--accent);color:#fff}
.cmp-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
table.cmp{width:100%;border-collapse:collapse;min-width:640px}
.cmp thead{background:#f8fafc}
.cmp th{padding:14px 18px;font-family:var(--ffd);font-size:13px;font-weight:600;color:#1e293b;text-align:center;border-bottom:1px solid var(--border)}
.cmp th:first-child{text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8}
.cmp td{padding:12px 18px;border-bottom:1px solid #f1f5f9;text-align:center;font-size:14px}
.cmp tr:last-child td{border-bottom:none}
.cmp td:first-child{text-align:left;color:#64748b;font-size:13px;border-right:1px solid #f1f5f9}
.cmp tr:hover td{background:#fafbfc}
.bar-c{display:flex;align-items:center;justify-content:center;gap:9px}
.bar-m{width:62px;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden}
.bar-f{height:100%;border-radius:3px;transition:width .4s}
.bar-n{font-family:var(--ffm);font-size:12px;color:#334155;min-width:30px;text-align:right}

/* ═══ EU SUBSIDY TABLE ═══ */
.eut-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
table.eut{width:100%;border-collapse:collapse;font-size:14px}
.eut thead{background:#f8fafc}
.eut th{padding:14px 18px;text-align:left;font-size:12px;font-weight:600;color:#64748b;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
.eut td{padding:13px 18px;border-bottom:1px solid #f8fafc;vertical-align:middle}
.eut tr:last-child td{border-bottom:none}
.eut tr:hover td{background:#fafbfc}
.s-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.sb-act{background:#dcfce7;color:#16a34a}.sb-par{background:#fef9c3;color:#a16207}.sb-end{background:#fee2e2;color:#dc2626}

.prog{width:100%;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-top:5px}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,#1677ff,#06b6d4)}

/* ═══ SECTION LABEL ═══ */
.sec-ey{font-family:var(--ffm);font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.sec-ey::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.sec-ttl{font-family:var(--ffd);font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:28px}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

footer{background:#0f172a;padding:22px 48px;text-align:center;font-size:13px;color:#475569}
footer em{color:#3b82f6;font-style:normal}

/* ═══ TICKER ═══ */
.ticker-bar{
  background:#0f172a;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;
  height:42px;overflow:hidden;
  position:sticky;top:0;z-index:200;
}

  flex-shrink:0;
  display:flex;align-items:center;gap:7px;
  padding:0 16px 0 18px;
  border-right:1px solid rgba(255,255,255,.1);
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:#60a5fa;white-space:nowrap;
  height:100%;
}
.ticker-live{
  width:7px;height:7px;border-radius:50%;
  background:#4ade80;flex-shrink:0;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.ticker-track-wrap{
  flex:1;overflow:hidden;height:100%;
  position:relative;
  mask-image:linear-gradient(to right,transparent 0%,#000 60px,#000 calc(100% - 60px),transparent 100%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,#000 60px,#000 calc(100% - 60px),transparent 100%);
}
.ticker-track{
  display:flex;align-items:center;
  gap:0;
  white-space:nowrap;
  will-change:transform;
  height:100%;
}
.ticker-track.paused{ animation-play-state:paused!important; }
.ti{
  display:inline-flex;align-items:center;gap:9px;
  padding:0 28px;height:100%;
  border-right:1px solid rgba(255,255,255,.07);
  cursor:default;transition:background .15s;
  flex-shrink:0;
}
.ti:hover{background:rgba(255,255,255,.05);}
.ti-flag{font-size:16px;line-height:1}
.ti-country{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:600;
  color:#94a3b8;white-space:nowrap;
}
.ti-key{font-size:12px;color:#64748b;white-space:nowrap}
.ti-val{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:600;
  white-space:nowrap;
}
.tv-up{color:#4ade80}
.tv-dn{color:#f87171}
.tv-warn{color:#fbbf24}
.tv-neu{color:#94a3b8}
.ti-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;

function cardHTML(d,i){

  const off=C*(1-d.score/100);
  const tagsH=d.tags.map(t=>`<span class=&quot;tag ${t.c}&quot;>${t.t}</span>`).join('');
  const clsColor={'vg':'#16a34a','va':'#d97706','vr':'#dc2626','vb':'#2563eb'};
  const kvsH=d.items.map(it=>`<div class=&quot;kv&quot;><div class=&quot;kk&quot;>${it.k}</div><div class=&quot;kv-val&quot; style=&quot;color:${clsColor[it.cls]||'#334155'}&quot;>${it.v}</div></div>`).join('');
  const updM=d.notice.match(/^【(.+?)】/);
  const updBadge=updM?`<div class=&quot;upd-badge&quot;><span class=&quot;upd-dot&quot;></span>${updM[1]}</div>`:'';
  const noticeText=d.notice.replace(/^【.+?】/,'');
  return `<div class=&quot;pc&quot; style=&quot;animation-delay:${i*45}ms;opacity:0;animation:pcIn .3s ease ${i*45}ms forwards&quot;>
    <style>.pc{animation:pcIn .3s ease forwards}@keyframes pcIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}</style>
    <div class=&quot;pc-stripe&quot; style=&quot;background:${d.color}&quot;></div>
    <div class=&quot;pc-head&quot;>
      <div class=&quot;pc-flag&quot;>${d.flag}</div>
      <div style=&quot;flex:1&quot;><div class=&quot;pc-name&quot;>${d.name}</div><div class=&quot;pc-dept&quot;>${d.dept}</div></div>
      <div class=&quot;pc-score&quot;>
        <svg viewBox=&quot;0 0 44 44&quot;><circle cx=&quot;22&quot; cy=&quot;22&quot; r=&quot;17&quot; fill=&quot;none&quot; stroke=&quot;#e2e8f0&quot; stroke-width=&quot;4&quot;/>
        <circle cx=&quot;22&quot; cy=&quot;22&quot; r=&quot;17&quot; fill=&quot;none&quot; stroke=&quot;${d.color}&quot; stroke-width=&quot;4&quot;
          stroke-linecap=&quot;round&quot; stroke-dasharray=&quot;${C.toFixed(1)}&quot; stroke-dashoffset=&quot;${off.toFixed(1)}&quot;/></svg>
        <div class=&quot;pc-score-n&quot;>${d.score}</div>
      </div>
    </div>
    <div class=&quot;pc-tags&quot;>${tagsH}</div>
    <div class=&quot;pc-items&quot;>${kvsH}</div>
    <div class=&quot;pc-notice&quot; style=&quot;border-left-color:${d.color}&quot;>${updBadge}${noticeText}</div>
  </div>`;
}
function renderCards(data,gridId){
  const grid=document.getElementById(gridId);
  const q=ST.q.toLowerCase();
  const items=data.filter(d=>{
    if(ST.r!=='all'&amp;&amp;d.r!==ST.r)return false;
    if(q&amp;&amp;!JSON.stringify(d).toLowerCase().includes(q))return false;
    return true;
  });
  if(!items.length){grid.innerHTML='<div style=&quot;grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;font-size:16px&quot;>未找到匹配的政策数据</div>';return;}
  grid.innerHTML=items.map((d,i)=>cardHTML(d,i)).join('');
}

    const speed = pxPerCm * 7.5;
    const totalW = track.scrollWidth / 2;
    const dur = totalW / speed;
    track.style.animation = `tickScroll ${dur}s linear infinite`;
  });

  });

  const body=`<tbody>${t.rows.map(r=>`<tr><td>${r.cat}</td>${r.cells.map(c=>`<td><div class=&quot;tc-sub&quot;>${c.sub}</div><span class=&quot;tc-r ${c.l}&quot;>${c.rate}</span><div class=&quot;tc-n&quot;>${c.note}</div></td>`).join('')}</tr>`).join('')}</tbody>`;
  document.getElementById('tft').innerHTML=head+body;
  document.getElementById('tft-note').innerHTML=t.note;

  const regions=[...new Set(GLOBAL_TARIFF.map(d=>d.region))];
  const rColors={'东亚':'#10b981','欧洲':'#0ea5e9','中东':'#f59e0b','亚太':'#8b5cf6','北美':'#ef4444','拉美':'#f97316','高壁垒':'#dc2626'};
  const gHead=`<thead><tr><th style=&quot;min-width:50px&quot;>区域</th><th style=&quot;min-width:160px&quot;>国家/地区</th><th>对华电池Pack关税（HS 8507.60）</th><th>进口门槛评级</th><th>备注</th></tr></thead>`;
  const gBody=`<tbody>${GLOBAL_TARIFF.map(d=>{
    const barW=d.rate==='0%'?4:d.rate.includes('82')?100:Math.min(100,Math.round(parseFloat(d.rate)*1.4));
    const barColor=d.level==='rh'?'#ef4444':d.level==='rm'?'#f59e0b':'#10b981';
    const lvlLabel=d.level==='rh'?'🔴 高壁垒':d.level==='rm'?'🟡 中等':'🟢 低壁垒';
    return `<tr>
      <td><span style=&quot;display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;background:${rColors[d.region]||'#64748b'}22;color:${rColors[d.region]||'#64748b'}&quot;>${d.region}</span></td>

      <td style=&quot;font-size:13px;color:#64748b;max-width:280px&quot;>${d.note}</td></tr>`;
  }).join('')}</tbody>`;
  document.getElementById('global-tft').innerHTML=gHead+gBody;
}

let ST = {mkt:'all',cat:'all',view:'cards',q:''};
let searchResultsAll = [];
let showingAllResults = false;
const RESULTS_PREVIEW = 8;

// ═══════════════════════════════════════════════════
//  SEARCH ENGINE  ── clause-level
// ═══════════════════════════════════════════════════
function highlight(text, q){
  if(!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&amp;')})`, 'gi');
  return text.replace(re, '<mark class=&quot;hl&quot;>$1</mark>');
}

function searchClauses(q){
  if(!q || q.length < 2) return [];
  const ql = q.toLowerCase();
  const hits = [];
  for(const cert of CERTS){
    // search cert-level fields
    const certText = [cert.std, cert.full, cert.mktName].join(' ').toLowerCase();
    for(const sec of cert.sections){
      for(const cl of sec.clauses){
        const clText = [cl.no||'', cl.key||'', cl.val||'', cl.note||''].join(' ').toLowerCase();
        if(clText.includes(ql) || certText.includes(ql)){
          hits.push({
            cert,
            section: sec.title,
            clause: cl,
            score: clText.includes(ql) ? 2 : 1,
          });
        }
      }
    }
    // also search notice
    if(cert.notice &amp;&amp; cert.notice.toLowerCase().includes(ql)){
      hits.push({cert, section:'PD关注点', clause:{no:'—',key:'PD关注点',val:cert.notice}, score:1});
    }
  }
  // dedup and sort by score
  hits.sort((a,b)=>b.score-a.score);
  return hits;
}

function renderSearchResults(q){
  const panel = document.getElementById('sr-panel');
  const resultsEl = document.getElementById('sr-results');
  const countEl = document.getElementById('sr-count');
  const showAllEl = document.getElementById('sr-show-all');

  if(!q || q.length < 2){
    panel.classList.remove('on');
    document.getElementById('sh-hint').textContent = '输入关键词，直接定位到相关条款';
    document.getElementById('sh-clear').style.display = 'none';
    return;
  }

  document.getElementById('sh-clear').style.display = '';
  searchResultsAll = searchClauses(q);
  const total = searchResultsAll.length;
  countEl.textContent = `${total} 条条款匹配`;
  document.getElementById('sh-hint').textContent = total > 0 ? `找到 ${total} 条相关条款` : '未找到相关条款';

  if(total === 0){
    panel.classList.add('on');
    resultsEl.innerHTML = `<div class=&quot;sr-empty&quot;>未找到与&quot;${q}&quot;相关的认证条款<br><span style=&quot;font-size:12px;margin-top:6px;display:block&quot;>建议尝试：热失控 / 过充 / 绝缘 / UN R100 / 碳足迹 / 担保</span></div>`;
    showAllEl.style.display = 'none';
    return;
  }

  panel.classList.add('on');
  const toShow = showingAllResults ? searchResultsAll : searchResultsAll.slice(0, RESULTS_PREVIEW);
  resultsEl.innerHTML = toShow.map(h=>{
    const c = h.cert;
    const cl = h.clause;
    return `<div class=&quot;sr-item&quot; onclick=&quot;jumpToCard('${c.id}')&quot;>
      <span class=&quot;sr-item-flag&quot;>${c.flag}</span>
      <div>
        <div class=&quot;sr-item-std&quot;>${c.std} <span style=&quot;font-size:11px;color:var(--text3);font-weight:400&quot;>· ${c.mktName}</span></div>
        ${cl.no &amp;&amp; cl.no!=='—' ? `<div class=&quot;sr-item-clause&quot;>${cl.no} ${h.section}</div>`:`<div class=&quot;sr-item-clause&quot;>${h.section}</div>`}
        <div class=&quot;sr-item-text&quot;>${highlight(cl.key,'')}: ${highlight(cl.val, q)}</div>
      </div>
      <span class=&quot;sr-item-mkt&quot;>${MF[c.mkt]||''} ${c.mkt}</span>
    </div>`;
  }).join('');

  showAllEl.style.display = (!showingAllResults &amp;&amp; total > RESULTS_PREVIEW) ? '' : 'none';
  if(!showingAllResults &amp;&amp; total > RESULTS_PREVIEW){
    showAllEl.querySelector('button').textContent = `显示全部 ${total} 条结果 ↓`;
  }
}

function showAllResults(){
  showingAllResults = true;
  renderSearchResults(ST.q);
}

function clearSearch(){
  document.getElementById('main-srch').value = '';
  ST.q = '';
  showingAllResults = false;
  searchResultsAll = [];
  renderSearchResults('');
  render();
}

function jumpToCard(certId){
  ST.view = 'cards';
  document.querySelectorAll('[data-view]').forEach(b=>b.classList.toggle('on', b.dataset.view==='cards'));
  document.querySelectorAll('[data-mkt]').forEach(b=>b.classList.toggle('on', b.dataset.mkt==='all'));
  document.querySelectorAll('[data-cat]').forEach(b=>b.classList.toggle('on', b.dataset.cat==='all'));
  ST.mkt = 'all'; ST.form = 'all'; ST.cat = 'all';
  renderCards(CERTS, true, certId);
  document.getElementById('v-cards').classList.add('on');
  document.getElementById('v-matrix').classList.remove('on');
  document.getElementById('v-timeline').classList.remove('on');
  setTimeout(()=>{
    const el = document.getElementById('card-'+certId);
    if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('search-match'); setTimeout(()=>el.classList.remove('search-match'),2500); }
  }, 100);
}

// ═══════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════
function filterCerts(){
  return CERTS.filter(c=>{
    if(ST.mkt !== 'all' &amp;&amp; c.mkt !== ST.mkt) return false;

    if(ST.cat !== 'all' &amp;&amp; !c.cats.includes(ST.cat)) return false;
    return true;
  });
}

  const grid = document.getElementById('cert-grid');
  if(!data.length){
    grid.innerHTML = '<div style=&quot;grid-column:1/-1;text-align:center;padding:64px;color:var(--text3);font-size:15px&quot;>未找到匹配的认证标准</div>';
    return;
  }
  grid.innerHTML = data.map((c,i)=>{
    const badgesH = c.badges.map(b=>`<span class=&quot;badge ${b.c}&quot;>${b.t}</span>`).join('');
    const tagsH = c.tags.map(t=>`<span class=&quot;ct ${t.c}&quot;>${t.t}</span>`).join('');
    const sectionsH = c.sections.map(sec=>{
      const clausesH = sec.clauses.map(cl=>{
        const isMatch = q &amp;&amp; ([cl.no||'',cl.key||'',cl.val||'',cl.note||''].join(' ').toLowerCase().includes(q));
        return `<div class=&quot;clause-item${isMatch?' match-hl':''}&quot;>
          ${cl.no ? `<div class=&quot;clause-no&quot;>${cl.no}</div>` : ''}
          <div class=&quot;clause-key&quot;>${q ? highlight(cl.key,q) : cl.key}</div>
          <div class=&quot;clause-val${cl.severity?' '+cl.severity:''}&quot;>${q ? highlight(cl.val,q) : cl.val}</div>
          ${cl.note ? `<div class=&quot;clause-note&quot;>${cl.note}</div>` : ''}
        </div>`;
      }).join('');
      return `<div class=&quot;cc-section&quot;>
        <div class=&quot;cc-section-hd&quot; onclick=&quot;toggleSection(this)&quot;>
          <span class=&quot;cc-section-icon&quot; style=&quot;background:${sec.iconBg};color:${sec.color}&quot;>${sec.icon}</span>
          <span class=&quot;cc-section-title&quot;>${sec.title}</span>
          <span class=&quot;cc-section-badge&quot; style=&quot;background:${sec.iconBg};color:${sec.color}&quot;>${sec.clauses.length}项</span>
          <span class=&quot;cc-section-toggle&quot;>▾</span>
        </div>
        <div class=&quot;clause-list&quot;>${clausesH}</div>
      </div>`;
    }).join('');
    const labsH = c.labs.map(l=>`<span class=&quot;lab&quot;>${l}</span>`).join('');
    return `<div class=&quot;cc&quot; id=&quot;card-${c.id}&quot; style=&quot;--cd:${i*35}ms&quot;>
      <div class=&quot;cc-top&quot; style=&quot;background:${c.color}&quot;></div>
      <div class=&quot;cc-head&quot;>
        <div class=&quot;cc-flag-wrap&quot;><div class=&quot;cc-flag&quot;>${c.flag}</div><div class=&quot;cc-mkt-tag&quot;>${c.mktName}</div></div>
        <div class=&quot;cc-info&quot;>
          <div class=&quot;cc-std&quot;>${c.std}</div>
          <div class=&quot;cc-full&quot;>${c.full}</div>
          <div class=&quot;cc-badges&quot;>${badgesH}</div>

      ${sectionsH}
      <div class=&quot;cc-labs&quot;><span class=&quot;cc-labs-lbl&quot;>认可测试机构</span>${labsH}</div>

        <div class=&quot;cc-notice-lbl&quot; style=&quot;color:${c.noticeColor||c.color}&quot;>${c.noticeLbl||'注意事项'}</div>
        ${c.notice}
      </div>
    </div>`;
  }).join('');
}

function toggleSection(hd){
  const sec = hd.closest('.cc-section');

}

// ═══════════════════════════════════════════════════
//  RENDER MATRIX
// ═══════════════════════════════════════════════════
function renderMatrix(){
  const sm = {must:{c:'mx-must',s:'●',l:'强制'},vol:{c:'mx-vol',s:'○',l:'自愿'},plan:{c:'mx-plan',s:'△',l:'过渡'},na:{c:'mx-na',s:'—',l:'N/A'}};
  const t = document.getElementById('matrix-table');
  const head = `<thead><tr><th>认证标准</th>${MKTS.map(m=>`<th>${MF[m]}<br><span style=&quot;font-family:var(--ffm);font-size:10px&quot;>${m}</span></th>`).join('')}</tr></thead>`;
  const body = `<tbody>${MATRIX.map(row=>`<tr>
    <td><div class=&quot;mx-std&quot;>${row.std}</div><div class=&quot;mx-cat&quot;>${row.cat}</div></td>
    ${MKTS.map(m=>{const s=row.cells[m]||'na';const {c,s:sym,l}=sm[s];return `<td><div style=&quot;display:flex;flex-direction:column;align-items:center;gap:2px&quot;><div class=&quot;mx-dot ${c}&quot;>${sym}</div><div class=&quot;mx-lbl&quot;>${l}</div></div></td>`;}).join('')}
  </tr>`).join('')}</tbody>`;
  t.innerHTML = head+body;
}

// ═══════════════════════════════════════════════════
//  RENDER TIMELINE
// ═══════════════════════════════════════════════════
function renderTimeline(){
  const il = {'high':'⚠ 高影响','mid':'⚡ 中等影响','low':'ℹ 低影响'};
  document.getElementById('tl-grid').innerHTML = TIMELINE.map((e,i)=>`
    <div class=&quot;tl-card&quot; style=&quot;--td:${i*45}ms;--tc:${e.color}&quot;>
      <div class=&quot;tl-year&quot;><div class=&quot;tl-dot-s&quot;></div>${e.year}</div>
      <div class=&quot;tl-ttl&quot;>${e.title}</div>
      <div class=&quot;tl-body&quot;>${e.body}</div>
      <div class=&quot;tl-impact impact-${e.impactLevel}&quot;><strong>${il[e.impactLevel]}</strong> ${e.impact}</div>
      <div class=&quot;tl-mkt&quot;>${e.mkts.map(m=>`<span class=&quot;tl-mkt-t&quot;>${MF[m]} ${m}</span>`).join('')}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════
//  MASTER RENDER
// ═══════════════════════════════════════════════════
function render(){
  const f = filterCerts();
  ['cards','matrix','timeline'].forEach(v=>{
    document.getElementById('v-'+v).classList.toggle('on', ST.view===v);
  });
  const tm = {cards:'认证卡片',matrix:'合规矩阵',timeline:'变更时间轴'};
  document.getElementById('view-title').textContent = tm[ST.view];
  document.getElementById('view-count').textContent = ST.view==='cards'?`${f.length} 条`:ST.view==='timeline'?`${TIMELINE.length} 项`:`${MATRIX.length} × ${MKTS.length}`;
  if(ST.view==='cards') renderCards(f);
  else if(ST.view==='matrix') renderMatrix();
  else renderTimeline();
}

// ═══════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════
document.querySelectorAll('[data-mkt]').forEach(b=>b.addEventListener('click',()=>{
  ST.mkt=b.dataset.mkt;document.querySelectorAll('[data-mkt]').forEach(x=>x.classList.toggle('on',x===b));render();
}));

document.querySelectorAll('[data-cat]').forEach(b=>b.addEventListener('click',()=>{
  ST.cat=b.dataset.cat;document.querySelectorAll('[data-cat]').forEach(x=>x.classList.toggle('on',x===b));render();
}));
document.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>{
  ST.view=b.dataset.view;document.querySelectorAll('[data-view]').forEach(x=>x.classList.toggle('on',x===b));render();
}));

let srchTimer;
document.getElementById('main-srch').addEventListener('input',e=>{
  ST.q = e.target.value.trim();
  showingAllResults = false;
  clearTimeout(srchTimer);
  srchTimer = setTimeout(()=>{ renderSearchResults(ST.q); render(); }, 180);
});

render();

.cmp tr:last-child td{border-bottom:none}

.bar-c{display:flex;align-items:center;justify-content:center;gap:9px}

/* ═══ EU SUBSIDY TABLE ═══ */

.eut thead{background:#f8fafc}

.eut td{padding:13px 18px;border-bottom:1px solid #f8fafc;vertical-align:middle}
.eut tr:last-child td{border-bottom:none}
.eut tr:hover td{background:#fafbfc}
.s-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600}
.sb-act{background:#dcfce7;color:#16a34a}.sb-par{background:#fef9c3;color:#a16207}.sb-end{background:#fee2e2;color:#dc2626}
.sb-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.prog{width:100%;height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden;margin-top:5px}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,#1677ff,#06b6d4)}

/* ═══ SECTION LABEL ═══ */
.sec-ey{font-family:var(--ffm);font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.sec-ey::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--accent)}
.sec-ttl{font-family:var(--ffd);font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:28px}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

footer{background:#0f172a;padding:22px 48px;text-align:center;font-size:13px;color:#475569}
footer em{color:#3b82f6;font-style:normal}

/* ═══ TICKER ═══ */
.ticker-bar{
  background:#0f172a;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;
  height:42px;overflow:hidden;
  position:sticky;top:0;z-index:200;
}
.ticker-label{
  flex-shrink:0;
  display:flex;align-items:center;gap:7px;
  padding:0 16px 0 18px;
  border-right:1px solid rgba(255,255,255,.1);
  font-family:'Space Grotesk',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;
  color:#60a5fa;white-space:nowrap;
  height:100%;
}
.ticker-live{
  width:7px;height:7px;border-radius:50%;
  background:#4ade80;flex-shrink:0;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.ticker-track-wrap{
  flex:1;overflow:hidden;height:100%;
  position:relative;
  mask-image:linear-gradient(to right,transparent 0%,#000 60px,#000 calc(100% - 60px),transparent 100%);
  -webkit-mask-image:linear-gradient(to right,transparent 0%,#000 60px,#000 calc(100% - 60px),transparent 100%);
}
.ticker-track{
  display:flex;align-items:center;
  gap:0;
  white-space:nowrap;
  will-change:transform;
  height:100%;
}
.ticker-track.paused{ animation-play-state:paused!important; }
.ti{
  display:inline-flex;align-items:center;gap:9px;
  padding:0 28px;height:100%;
  border-right:1px solid rgba(255,255,255,.07);
  cursor:default;transition:background .15s;
  flex-shrink:0;
}
.ti:hover{background:rgba(255,255,255,.05);}
.ti-flag{font-size:16px;line-height:1}
.ti-country{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:600;
  color:#94a3b8;white-space:nowrap;
}
.ti-key{font-size:12px;color:#64748b;white-space:nowrap}
.ti-val{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:600;
  white-space:nowrap;
}
.tv-up{color:#4ade80}
.tv-dn{color:#f87171}
.tv-warn{color:#fbbf24}
.tv-neu{color:#94a3b8}
.ti-badge{
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
  white-space:nowrap;
}
.tb-up{background:rgba(74,222,128,.15);color:#4ade80}
.tb-dn{background:rgba(248,113,113,.15);color:#f87171}
.tb-warn{background:rgba(251,191,36,.15);color:#fbbf24}
.ticker-pause{
  flex-shrink:0;width:38px;height:100%;
  background:transparent;border:none;border-left:1px solid rgba(255,255,255,.08);
  color:#475569;font-size:14px;cursor:pointer;
  transition:color .15s,background .15s;
}
.ticker-pause:hover{color:#94a3b8;background:rgba(255,255,255,.04)}

.tl-dot-red{border-color:#ef4444}
.tl-dot-grn{border-color:#16a34a}
.tl-dot-amb{border-color:#d97706}
.tl-date{font-family:var(--ffm);font-size:11px;color:#94a3b8;margin-bottom:4px;letter-spacing:.05em}

    <div class=&quot;pc-items&quot;>${kvsH}</div>
    <div class=&quot;pc-notice&quot; style=&quot;border-left-color:${d.color}&quot;>${updBadge}${noticeText}</div>
  </div>`;
}
function renderCards(data,gridId){
  const grid=document.getElementById(gridId);
  const q=ST.q.toLowerCase();
  const items=data.filter(d=>{
    if(ST.r!=='all'&amp;&amp;d.r!==ST.r)return false;
    if(q&amp;&amp;!JSON.stringify(d).toLowerCase().includes(q))return false;
    return true;
  });
  if(!items.length){grid.innerHTML='<div style=&quot;grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8;font-size:16px&quot;>未找到匹配的政策数据</div>';return;}
  grid.innerHTML=items.map((d,i)=>cardHTML(d,i)).join('');
}
function renderTimeline(){
  function mkList(arr, listId){
    document.getElementById(listId).innerHTML = arr.map((e, i) => `
      <div class=&quot;tl-item&quot; style=&quot;--td:${i * 70}ms&quot;>
        <div class=&quot;tl-dot ${e.dot}&quot;></div>
        <div class=&quot;tl-date&quot;>${e.date}</div>
        <div class=&quot;tl-title&quot;>
          ${e.title}
          <span class=&quot;tl-chip&quot; style=&quot;background:${e.cB};color:${e.cC}&quot;>${e.chip}</span>
        </div>
        <div class=&quot;tl-body ${e.body}&quot;>${e.text}</div>
      </div>`).join('');
  }
  mkList(TL_BAD, 'tl-bad-list');
  mkList(TL_GOOD, 'tl-good-list');
}
function destroyCharts(){Object.values(charts).forEach(c=>c&amp;&amp;c.destroy&amp;&amp;c.destroy());charts={};}
function renderCharts(){
  destroyCharts();
  const R=['CN','EU','US','JP','KR'];
  const N={'CN':'🇨🇳 中国','EU':'🇪🇺 欧盟','US':'🇺🇸 美国','JP':'🇯🇵 日本','KR':'🇰🇷 韩国'};
  const CLR={'CN':'#ef4444','EU':'#0ea5e9','US':'#8b5cf6','JP':'#f59e0b','KR':'#10b981'};
  const CLRA=r=>CLR[r]+'33';

  const rk=['sub','reg','ev','bp','lc','rc'];
  const rm={sub:100,reg:100,ev:10,bp:100,lc:100,rc:100};
  const rl=['补贴支持','法规严格','EV补贴','电池护照','本土制造','再生料'];
  charts.radar=new Chart(document.getElementById('radarC'),{
    type:'radar',
    data:{labels:rl,datasets:R.map(r=>({
      label:N[r],data:rk.map(k=>{const m=METRICS.find(x=>x.id===k);return Math.round(m.vals[r]/rm[k]*100);}),
      borderColor:CLR[r],backgroundColor:CLRA(r),borderWidth:2.5,pointRadius:4,pointBackgroundColor:CLR[r]
    }))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:13},boxWidth:11,padding:14}}},
      scales:{r:{beginAtZero:true,max:100,ticks:{display:false,font:{size:11}},grid:{color:'#e2e8f0'},
        pointLabels:{font:{size:13,family:'DM Sans'},color:'#475569'}}}}
  });

  charts.sub=new Chart(document.getElementById('subBar'),{
    type:'bar',
    data:{labels:R.map(r=>N[r]),datasets:[{label:'EV最高补贴（万元等值）',data:R.map(r=>METRICS.find(x=>x.id==='ev').vals[r]),backgroundColor:R.map(r=>CLR[r]),borderRadius:8,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ¥${ctx.raw} 万元`}}},
      scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:12},color:'#64748b',callback:v=>`¥${v}万`}},
        x:{grid:{display:false},ticks:{font:{size:13},color:'#475569'}}}}
  });

  charts.tar=new Chart(document.getElementById('tarBar'),{
    type:'bar',
    data:{labels:R.map(r=>N[r]),datasets:[
      {label:'电芯关税%',data:R.map(r=>METRICS.find(x=>x.id==='tc').vals[r]),backgroundColor:'#93c5fd',borderRadius:5},
      {label:'Pack关税%',data:R.map(r=>METRICS.find(x=>x.id==='tp').vals[r]),backgroundColor:'#3b82f6',borderRadius:5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:12},boxWidth:10,padding:10}}},
      scales:{y:{beginAtZero:true,grid:{color:'#f1f5f9'},ticks:{font:{size:12},color:'#64748b'}},
        x:{grid:{display:false},ticks:{font:{size:13},color:'#475569'}}}}
  });

  charts.bub=new Chart(document.getElementById('bubC'),{
    type:'bubble',
    data:{datasets:R.map(r=>({
      label:N[r],
      data:[{x:METRICS.find(x=>x.id==='sub').vals[r],y:METRICS.find(x=>x.id==='reg').vals[r],r:Math.max(7,METRICS.find(x=>x.id==='ev').vals[r]*4.5)}],
      backgroundColor:CLRA(r),borderColor:CLR[r],borderWidth:2.5
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{font:{size:12},boxWidth:11,padding:12}},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}  补贴:${ctx.parsed.x} / 法规:${ctx.parsed.y}`}}},
      scales:{
        x:{min:0,max:105,title:{display:true,text:'补贴支持力度',font:{size:13},color:'#64748b'},grid:{color:'#f1f5f9'},ticks:{font:{size:12},color:'#94a3b8'}},
        y:{min:0,max:105,title:{display:true,text:'法规严格程度',font:{size:13},color:'#64748b'},grid:{color:'#f1f5f9'},ticks:{font:{size:12},color:'#94a3b8'}}
      }}
  });

  renderCmpTable();
  document.getElementById('sel-r').innerHTML=METRICS.map(m=>`<button class=&quot;sel-b ${ST.sel.has(m.id)?'on':''}&quot; onclick=&quot;toggleSel('${m.id}')&quot;>${m.lbl}</button>`).join('');
}
function renderCmpTable(){
  const R=['CN','EU','US','JP','KR'];
  const N={'CN':'🇨🇳 中国','EU':'🇪🇺 欧盟','US':'🇺🇸 美国','JP':'🇯🇵 日本','KR':'🇰🇷 韩国'};
  const CLR={'CN':'#ef4444','EU':'#0ea5e9','US':'#8b5cf6','JP':'#f59e0b','KR':'#10b981'};
  const sel=METRICS.filter(m=>ST.sel.has(m.id));
  const t=document.getElementById('cmp-t');
  if(!sel.length){t.innerHTML='<tbody><tr><td colspan=&quot;6&quot; style=&quot;text-align:center;padding:36px;color:#94a3b8;font-size:15px&quot;>请至少选择一个维度</td></tr></tbody>';return;}
  const head=`<thead><tr><th>指标</th>${R.map(r=>`<th>${N[r]}</th>`).join('')}</tr></thead>`;
  const body=`<tbody>${sel.map(m=>{
    const vals=R.map(r=>m.vals[r]);const mx=Math.max(...vals)||1;
    return `<tr><td>${m.lbl}<span style=&quot;color:#94a3b8;margin-left:6px;font-family:var(--ffm);font-size:11px&quot;>${m.unit}</span></td>
    ${R.map(r=>{const v=m.vals[r];const p=Math.round(v/mx*100);return `<td><div class=&quot;bar-c&quot;><div class=&quot;bar-m&quot;><div class=&quot;bar-f&quot; style=&quot;width:${p}%;background:${CLR[r]}&quot;></div></div><span class=&quot;bar-n&quot;>${v}</span></div></td>`;}).join('')}</tr>`;
  }).join('')}</tbody>`;
  t.innerHTML=head+body;
}
function toggleSel(id){
  if(ST.sel.has(id)){if(ST.sel.size>1)ST.sel.delete(id);}else ST.sel.add(id);
  renderCmpTable();
  document.querySelectorAll('.sel-b').forEach(b=>{
    const bid=b.getAttribute('onclick').match(/'(.+?)'/)[1];
    b.classList.toggle('on',ST.sel.has(bid));
  });
}
let charts={};
let ST={sub:'reg',r:'all',q:'',sel:new Set(['sub','reg','tc','ev'])};
let chartsRendered=false;
function render(){
  ['reg','timeline','chart'].forEach(v=>{
    const el=document.getElementById('sv-'+v);
    if(el)el.classList.toggle('on',ST.sub===v);
  });
  const showReg=ST.sub==='reg';
  document.getElementById('reg-g').style.display=showReg?'flex':'none';
  document.getElementById('srch-wrap').style.display=showReg?'':'none';
  if(ST.sub==='reg')renderCards(REGULATION,'r-grid');
  else if(ST.sub==='timeline')renderTimeline();
  else if(ST.sub==='chart'){
    // Use rAF so div is visible before Chart.js measures canvas
    requestAnimationFrame(function(){
      renderCharts();
      chartsRendered=true;
    });
  }
}
document.getElementById('sub-tab-g').addEventListener('click',e=>{
  const b=e.target.closest('[data-sub]');if(!b)return;
  ST.sub=b.dataset.sub;
  document.querySelectorAll('[data-sub]').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
document.getElementById('reg-g').addEventListener('click',e=>{
  const b=e.target.closest('[data-r]');if(!b)return;
  ST.r=b.dataset.r;
  document.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
document.getElementById('srch').addEventListener('input',e=>{ST.q=e.target.value;render();});
render();


</script>
